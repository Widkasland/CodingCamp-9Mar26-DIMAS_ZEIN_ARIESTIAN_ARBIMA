<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header dengan Theme Toggle -->
    <header class="header">
        <div class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i>
        </div>
    </header>

    <div class="container">
        <!-- Greeting Section -->
        <section class="greeting-section">
            <div class="greeting-input">
                <input type="text" id="userName" placeholder="Masukkan nama Anda..." maxlength="20">
                <button id="saveNameBtn" class="save-name-btn">
                    <i class="fas fa-save"></i>
                </button>
            </div>
            <div class="greeting-content">
                <h1 id="greetingText">Selamat pagi!</h1>
                <div class="datetime">
                    <div id="currentTime"></div>
                    <div id="currentDate"></div>
                </div>
            </div>
        </section>

        <!-- Main Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Focus Timer -->
            <section class="timer-section">
                <div class="timer-header">
                    <h2><i class="fas fa-clock"></i> Focus Timer</h2>
                    <div class="timer-controls">
                        <button id="timerStart" class="btn btn-primary"><i class="fas fa-play"></i></button>
                        <button id="timerStop" class="btn btn-secondary"><i class="fas fa-pause"></i></button>
                        <button id="timerReset" class="btn btn-secondary"><i class="fas fa-redo"></i></button>
                    </div>
                </div>
                <div class="timer-display">
                    <div id="timerDisplay">25:00</div>
                    <div id="timerProgress" class="timer-progress">
                        <div id="progressBar"></div>
                    </div>
                </div>
            </section>

            <!-- Quick Links -->
            <section class="quick-links-section">
                <div class="section-header">
                    <h2><i class="fas fa-link"></i> Quick Links</h2>
                    <button id="addLinkBtn" class="btn btn-sm btn-primary">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="quickLinksList" class="quick-links-list">
                    <!-- Quick links akan di-generate oleh JS -->
                </div>
            </section>

            <!-- To-Do List -->
            <section class="todo-section">
                <div class="section-header">
                    <h2><i class="fas fa-tasks"></i> To-Do List</h2>
                    <div class="todo-input-container">
                        <input type="text" id="todoInput" placeholder="Tambahkan tugas baru..." maxlength="60">
                        <button id="addTodoBtn" class="btn btn-primary">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
                <div id="todoList" class="todo-list">
                    <!-- Todos akan di-generate oleh JS -->
                </div>
                <div class="todo-stats">
                    <span id="todoStats">0 tugas tersisa</span>
                </div>
            </section>
        </div>

        <!-- Quick Links Modal -->
        <div id="linkModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Tambah Quick Link</h3>
                    <button id="closeModal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="text" id="linkName" placeholder="Nama link (contoh: Gmail)">
                    <input type="url" id="linkUrl" placeholder="https://gmail.com">
                </div>
                <div class="modal-footer">
                    <button id="saveLinkBtn" class="btn btn-primary">Simpan</button>
                    <button id="cancelLinkBtn" class="btn btn-secondary">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
